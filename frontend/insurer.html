<!DOCTYPE html>
<html>
<head>
  <title>Insurance Company | Fraud-Free Health Insurance</title>
  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>

  <style>
    body{margin:0;font-family:Segoe UI;background:#f5f8fb;}
    header{background:#0a3622;color:white;padding:20px 40px;}
    .container{
      padding:35px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:25px;
    }
    .card{
      background:white;
      padding:25px;
      border-radius:10px;
      box-shadow:0 8px 20px rgba(0,0,0,.1);
    }
    input,button{
      width:100%;
      padding:11px;
      margin-top:10px;
      border-radius:6px;
      border:1px solid #ccc;
    }
    .primary{background:#0a3622;color:white;border:none;}
    .approve{background:#198754;color:white;border:none;}
    .reject{background:#dc3545;color:white;border:none;}
  </style>
</head>

<body>

<header>
  <h2> Insurance Company Dashboard</h2>
  <small>Verify and approve insurance claims</small>
</header>

<div class="container">

  <div class="card">
    <h3>Connect</h3>
    <button onclick="connect()">Connect Wallet</button>
    <p id="acc"></p>
  </div>

  <div class="card">
    <h3>Register Hospital</h3>
    <input id="hospital" placeholder="Hospital Wallet Address">
    <button class="primary" onclick="registerHospital()">Register Hospital</button>
  </div>

  <div class="card">
  <h3>Submit User Hash</h3>

  <input id="cid" placeholder="Claim ID">
  <input type="file" id="userFile">

  <!-- 🔽 PASTE HERE -->
  <p><b>Uploaded Report:</b> <span id="fileName">None</span></p>

  <p><b>Generated SHA-256 Hash:</b></p>
  <div id="generatedHash"
       style="word-break:break-all;
              background:#eef2f7;
              padding:10px;
              border-radius:6px;
              font-size:13px;">
    Not generated
  </div>
  <!-- 🔼 END -->

  <button class="primary" onclick="submit()">Upload Report & Generate Hash</button>
  <button class="primary" onclick="submitUserHash()">Submit Hash</button>
</div>

  <div class="card">
    <h3>Auto Verify</h3>
    <button class="primary" onclick="autoVerify()">Auto Verify Claim</button>
  </div>

  <div class="card">
    <h3>Final Decision</h3>
    <button class="approve" onclick="finalDecision(true)">Approve</button>
    <button class="reject" onclick="finalDecision(false)">Reject</button>
  </div>

</div>

<script>
/* ================= CONTRACT DETAILS ================= */

const CONTRACT_ADDRESS = "0x2a881aDdB846d1B917A40571a9BEDCC4Dd6dEB09";

const ABI = [
  {"inputs":[],"stateMutability":"nonpayable","type":"constructor"},

  {"anonymous":false,"inputs":[
    {"indexed":false,"internalType":"uint256","name":"claimId","type":"uint256"},
    {"indexed":false,"internalType":"address","name":"user","type":"address"}
  ],"name":"ClaimApplied","type":"event"},

  {"anonymous":false,"inputs":[
    {"indexed":false,"internalType":"uint256","name":"claimId","type":"uint256"}
  ],"name":"ClaimApproved","type":"event"},

  {"anonymous":false,"inputs":[
    {"indexed":false,"internalType":"uint256","name":"claimId","type":"uint256"},
    {"indexed":false,"internalType":"bool","name":"matched","type":"bool"}
  ],"name":"ClaimAutoVerified","type":"event"},

  {"anonymous":false,"inputs":[
    {"indexed":false,"internalType":"uint256","name":"claimId","type":"uint256"}
  ],"name":"ClaimRejected","type":"event"},

  {"anonymous":false,"inputs":[
    {"indexed":false,"internalType":"address","name":"hospital","type":"address"}
  ],"name":"HospitalRegistered","type":"event"},

  {"anonymous":false,"inputs":[
    {"indexed":false,"internalType":"uint256","name":"reportId","type":"uint256"},
    {"indexed":false,"internalType":"address","name":"hospital","type":"address"},
    {"indexed":false,"internalType":"address","name":"user","type":"address"}
  ],"name":"HospitalReportStored","type":"event"},

  {"anonymous":false,"inputs":[
    {"indexed":false,"internalType":"uint256","name":"claimId","type":"uint256"}
  ],"name":"UserHashSubmitted","type":"event"},

  {"inputs":[],"name":"claimCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},

  {"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],
   "name":"claims","outputs":[
     {"internalType":"uint256","name":"id","type":"uint256"},
     {"internalType":"address","name":"user","type":"address"},
     {"internalType":"bytes32","name":"userHash","type":"bytes32"},
     {"internalType":"bool","name":"verified","type":"bool"},
     {"internalType":"bool","name":"approved","type":"bool"},
     {"internalType":"bool","name":"decided","type":"bool"}
   ],
   "stateMutability":"view","type":"function"},

  {"inputs":[],"name":"insurer","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},

  {"inputs":[{"internalType":"address","name":"","type":"address"}],
   "name":"isHospital","outputs":[{"internalType":"bool","name":"","type":"bool"}],
   "stateMutability":"view","type":"function"},

  {"inputs":[],"name":"reportCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},

  {"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],
   "name":"reports","outputs":[
     {"internalType":"uint256","name":"id","type":"uint256"},
     {"internalType":"address","name":"hospital","type":"address"},
     {"internalType":"address","name":"user","type":"address"},
     {"internalType":"bytes32","name":"hospitalHash","type":"bytes32"}
   ],
   "stateMutability":"view","type":"function"},

  {"inputs":[{"internalType":"address","name":"_hospital","type":"address"}],
   "name":"registerHospital","outputs":[],"stateMutability":"nonpayable","type":"function"},

  {"inputs":[
    {"internalType":"address","name":"_user","type":"address"},
    {"internalType":"bytes32","name":"_reportHash","type":"bytes32"}
  ],
   "name":"storeHospitalHash","outputs":[],"stateMutability":"nonpayable","type":"function"},

  {"inputs":[{"internalType":"uint256[]","name":"_reportIds","type":"uint256[]"}],
   "name":"applyClaim","outputs":[],"stateMutability":"nonpayable","type":"function"},

  {"inputs":[
    {"internalType":"uint256","name":"_claimId","type":"uint256"},
    {"internalType":"bytes32","name":"_userHash","type":"bytes32"}
  ],
   "name":"submitUserHash","outputs":[],"stateMutability":"nonpayable","type":"function"},

  {"inputs":[{"internalType":"uint256","name":"_claimId","type":"uint256"}],
   "name":"autoVerifyClaim","outputs":[],"stateMutability":"nonpayable","type":"function"},

  {"inputs":[
    {"internalType":"uint256","name":"_claimId","type":"uint256"},
    {"internalType":"bool","name":"_approve","type":"bool"}
  ],
   "name":"finalDecision","outputs":[],"stateMutability":"nonpayable","type":"function"},

  {"inputs":[{"internalType":"uint256","name":"_claimId","type":"uint256"}],
   "name":"getClaimReports","outputs":[{"internalType":"uint256[]","name":"","type":"uint256[]"}],
   "stateMutability":"view","type":"function"}
];

/* ================= WEB3 LOGIC ================= */

let web3, contract, account;

async function connect(){
  web3 = new Web3(window.ethereum);
  await ethereum.request({ method:"eth_requestAccounts" });
  account = (await web3.eth.getAccounts())[0];
  contract = new web3.eth.Contract(ABI, CONTRACT_ADDRESS);
  document.getElementById("acc").innerText = "Connected: " + account;
  console.log("ABI length:", contract._jsonInterface.length);
}

async function registerHospital(){
  await contract.methods.registerHospital(
    document.getElementById("hospital").value.trim()
  ).send({ from: account });
  alert("Hospital registered");
}
async function submit() {
  const file = document.getElementById("userFile").files[0];

  if (!file) {
    alert("Please upload a report file");
    return;
  }

  document.getElementById("fileName").innerText = file.name;

  const buffer = await file.arrayBuffer();
  const hashBuffer = await crypto.subtle.digest("SHA-256", buffer);
  generatedUserHash =
    "0x" + [...new Uint8Array(hashBuffer)]
      .map(b => b.toString(16).padStart(2, "0"))
      .join("");

  document.getElementById("generatedHash").innerText = generatedUserHash;

  alert("✅ Hash generated successfully");
}
async function submitUserHash() {
  try {
    const claimId = document.getElementById("cid").value;

    if (!claimId || !generatedUserHash) {
      alert("Generate hash first and enter Claim ID");
      return;
    }

    await contract.methods
      .submitUserHash(claimId, generatedUserHash)
      .send({ from: account });

    alert("✅ User hash submitted to blockchain");
  } catch (e) {
    console.error(e);
    alert("❌ Blockchain submission failed");
  }
}

async function autoVerify() {
  try {
    const cid = document.getElementById("cid").value;

    const receipt = await contract.methods
      .autoVerifyClaim(cid)
      .send({ from: account });

    const event = receipt.events.ClaimAutoVerified;
    const matched = event.returnValues.matched;

    alert("Auto Verification Result: " + matched);

    console.log("Matched:", matched);

  } catch (e) {
    console.error(e);
    alert("Auto verify failed");
  }
}


async function finalDecision(v){
  await contract.methods.finalDecision(
    document.getElementById("cid").value, v
  ).send({ from: account });
  alert("Decision stored");
}
</script>

</body>
</html>
