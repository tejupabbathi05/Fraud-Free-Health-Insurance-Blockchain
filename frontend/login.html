<!DOCTYPE html>
<html>
<head>
<title>Fraud-Free Health Insurance</title>
<style>
body{
  margin:0;
  font-family:Segoe UI, Arial;
  background:linear-gradient(120deg,#0b5ed7,#198754);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.card{
  background:#fff;
  padding:45px;
  width:420px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,.3);
}
h1{color:#0b5ed7;margin-bottom:5px;}
p{color:#555;margin-bottom:30px;}
button{
  width:100%;
  padding:14px;
  margin:12px 0;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
  color:white;
}
.hospital{background:#0b5ed7;}
.user{background:#198754;}
.insurer{background:#0a3622;}
footer{margin-top:20px;font-size:12px;color:#777;}
</style>
</head>
<body>

<div class="card">
  <h1>Fraud-Free Health Insurance</h1>
  <p>Blockchain-Based Transparent Claim System</p>

  <button class="hospital" onclick="go('hospital.html')">Hospital Portal</button>
  <button class="user" onclick="go('user.html')">Policy Holder Portal</button>
  <button class="insurer" onclick="go('insurer.html')">Insurance Company Portal</button>

  
</div>

<script>
function go(p){ window.location.href = p; }
</script>

</body>
</html>
